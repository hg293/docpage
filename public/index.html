<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocPage — Professional Websites for Doctors</title>
<meta name="description" content="Create a stunning professional website for your medical practice in minutes. Online booking, payments via Razorpay, and beautiful templates.">
<meta name="theme-color" content="#2D5A3D">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#2D5A3D;--forest-light:#3D7A52;--forest-dark:#1E3D2A;
  --gold:#C4A355;--gold-light:#D4B976;--gold-dark:#A68A3E;
  --sand:#F7F3ED;--sand-dark:#EDE5D8;
  --ivory:#FFFDF8;--white:#FFFFFF;
  --charcoal:#1C1C1A;--text:#3A3A36;--text-light:#7A7A72;
  --border:rgba(44,44,40,0.08);--border-strong:rgba(44,44,40,0.15);
  --shadow:0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.1);
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
  --nav-height:64px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--ivory);color:var(--text);
  line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:400;line-height:1.2;color:var(--charcoal)}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font-body);font-size:0.9rem}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.animate-up{animation:fadeUp 0.6s ease both}
.d1{animation-delay:0.1s}.d2{animation-delay:0.2s}.d3{animation-delay:0.3s}
.d4{animation-delay:0.4s}.d5{animation-delay:0.5s}

/* === LAYOUT === */
.container{max-width:1200px;margin:0 auto;padding:0 clamp(1.25rem,4vw,3rem)}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-height);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1.25rem,4vw,3rem);background:rgba(255,253,248,0.9);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--font-display);font-size:1.5rem;color:var(--forest);cursor:pointer}
.nav-logo em{font-style:italic;color:var(--gold)}
.nav-links{display:flex;gap:0.5rem;align-items:center}
.nav-btn{padding:0.45rem 1rem;border-radius:100px;font-size:0.82rem;font-weight:500;
  color:var(--text-light);transition:all 0.2s}
.nav-btn:hover{color:var(--forest)}
.nav-btn.primary{background:var(--forest);color:white;padding:0.5rem 1.25rem}
.nav-btn.primary:hover{background:var(--forest-light)}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.75rem;
  border-radius:100px;font-size:0.88rem;font-weight:500;transition:all 0.25s}
.btn-primary{background:var(--forest);color:white;box-shadow:0 4px 12px rgba(45,90,61,0.2)}
.btn-primary:hover{background:var(--forest-light);transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(45,90,61,0.3)}
.btn-secondary{border:1.5px solid var(--border-strong);color:var(--text);background:var(--white)}
.btn-secondary:hover{border-color:var(--forest);color:var(--forest)}
.btn-gold{background:var(--gold);color:white;box-shadow:0 4px 12px rgba(196,163,85,0.25)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-outline{border:1.5px solid var(--forest);color:var(--forest)}
.btn-outline:hover{background:var(--forest);color:white}
.btn-sm{padding:0.5rem 1.25rem;font-size:0.8rem}
.btn-lg{padding:0.9rem 2.25rem;font-size:1rem}
.btn-block{width:100%;justify-content:center}

/* === FORM === */
.form-group{display:flex;flex-direction:column;gap:0.3rem}
.form-label{font-size:0.75rem;font-weight:600;color:var(--text-light);
  text-transform:uppercase;letter-spacing:0.06em}
.form-input{padding:0.75rem 1rem;border-radius:var(--radius);
  border:1.5px solid var(--border);background:var(--white);color:var(--text);
  transition:all 0.2s}
.form-input:focus{outline:none;border-color:var(--forest);
  box-shadow:0 0 0 3px rgba(45,90,61,0.08)}
textarea.form-input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-hint{font-size:0.72rem;color:var(--text-light);margin-top:0.15rem}

/* === LANDING PAGE === */
.hero-landing{min-height:100vh;display:flex;align-items:center;
  padding:calc(var(--nav-height) + 4rem) 0 4rem;position:relative;overflow:hidden}
.hero-landing::before{content:'';position:absolute;top:-20%;right:-10%;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(45,90,61,0.06),transparent 70%)}
.hero-landing::after{content:'';position:absolute;bottom:-15%;left:-5%;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(196,163,85,0.06),transparent 70%)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;position:relative;z-index:1}
.hero-text h1{font-size:clamp(2.5rem,5vw,3.8rem);line-height:1.08;margin-bottom:1.25rem;
  letter-spacing:-0.02em}
.hero-text h1 em{font-style:italic;color:var(--forest)}
.hero-text p{font-size:1.05rem;color:var(--text-light);line-height:1.7;margin-bottom:2rem;max-width:480px}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.hero-trust{display:flex;align-items:center;gap:1rem}
.hero-avatars{display:flex}
.hero-avatars span{width:32px;height:32px;border-radius:50%;border:2px solid var(--ivory);
  display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;
  color:white;margin-left:-8px}
.hero-avatars span:first-child{margin-left:0}
.hero-trust-text{font-size:0.82rem;color:var(--text-light)}
.hero-trust-text strong{color:var(--text);font-weight:600}

/* Hero preview */
.hero-preview{position:relative}
.preview-browser{background:var(--white);border-radius:var(--radius-lg);
  border:1px solid var(--border);box-shadow:var(--shadow-lg);overflow:hidden}
.preview-toolbar{height:36px;background:var(--sand);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:6px}
.preview-dot{width:8px;height:8px;border-radius:50%}
.preview-dot.r{background:#FF6B6B}.preview-dot.y{background:#FFD93D}.preview-dot.g{background:#6BCB77}
.preview-url{flex:1;margin-left:8px;padding:4px 12px;border-radius:6px;
  background:var(--white);font-size:0.65rem;color:var(--text-light);border:1px solid var(--border)}
.preview-body{padding:1.5rem;min-height:320px}
.preview-card{padding:1.25rem;border-radius:var(--radius);border:1px solid var(--border);
  margin-bottom:0.75rem;animation:fadeUp 0.5s ease both}
.preview-card h4{font-family:var(--font-display);font-size:1.1rem;margin-bottom:0.25rem}
.preview-card p{font-size:0.75rem;color:var(--text-light)}
.preview-tags{display:flex;gap:0.35rem;margin-top:0.5rem;flex-wrap:wrap}
.preview-tag{padding:0.2rem 0.5rem;border-radius:100px;font-size:0.62rem;
  background:rgba(45,90,61,0.08);color:var(--forest);font-weight:500}
.preview-hero-mini{display:flex;gap:1rem;align-items:center;margin-bottom:1rem}
.preview-avatar{width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--forest),var(--forest-light));
  display:flex;align-items:center;justify-content:center;color:white;
  font-family:var(--font-display);font-size:1.2rem}
.preview-badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:100px;
  background:rgba(196,163,85,0.12);color:var(--gold-dark);font-size:0.6rem;
  font-weight:600;text-transform:uppercase;letter-spacing:0.06em}

/* === FEATURES === */
.section{padding:clamp(4rem,8vw,7rem) 0}
.section-header{text-align:center;margin-bottom:3rem}
.section-tag{display:inline-block;font-size:0.7rem;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--forest);margin-bottom:0.5rem}
.section-title{font-size:clamp(2rem,4vw,2.8rem);letter-spacing:-0.02em}
.section-desc{font-size:0.95rem;color:var(--text-light);max-width:560px;margin:0.75rem auto 0}
.section-alt{background:var(--sand)}

.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.feature-card{padding:2rem;border-radius:var(--radius-lg);background:var(--white);
  border:1px solid var(--border);transition:all 0.3s}
.feature-card:hover{border-color:var(--forest);transform:translateY(-3px);box-shadow:var(--shadow)}
.feature-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;margin-bottom:1.25rem;
  background:rgba(45,90,61,0.08)}
.feature-card h3{font-size:1.2rem;margin-bottom:0.5rem}
.feature-card p{font-size:0.85rem;color:var(--text-light);line-height:1.7}

/* === HOW IT WORKS === */
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem}
.step{text-align:center;position:relative}
.step::after{content:'';position:absolute;top:28px;left:calc(50% + 28px);
  width:calc(100% - 56px);height:2px;background:var(--border)}
.step:last-child::after{display:none}
.step-num{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--font-display);font-size:1.4rem;
  background:var(--forest);color:white;margin:0 auto 1rem;position:relative;z-index:1}
.step h3{font-size:1.1rem;margin-bottom:0.35rem}
.step p{font-size:0.82rem;color:var(--text-light)}

/* === PRICING === */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:960px;margin:0 auto}
.price-card{padding:2.5rem 2rem;border-radius:var(--radius-xl);background:var(--white);
  border:1px solid var(--border);position:relative;transition:all 0.3s}
.price-card.featured{border-color:var(--forest);box-shadow:var(--shadow-lg);transform:scale(1.03)}
.price-card.featured::before{content:'Most Popular';position:absolute;top:-12px;left:50%;
  transform:translateX(-50%);padding:0.3rem 1rem;border-radius:100px;
  background:var(--forest);color:white;font-size:0.7rem;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase}
.price-name{font-size:0.85rem;font-weight:600;color:var(--text-light);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem}
.price-amount{font-family:var(--font-display);font-size:2.8rem;color:var(--charcoal);line-height:1}
.price-amount span{font-size:1rem;color:var(--text-light);font-family:var(--font-body)}
.price-period{font-size:0.8rem;color:var(--text-light);margin-bottom:1.5rem}
.price-features{list-style:none;display:flex;flex-direction:column;gap:0.6rem;
  margin-bottom:2rem}
.price-features li{font-size:0.85rem;color:var(--text);padding-left:1.5rem;position:relative}
.price-features li::before{content:'✓';position:absolute;left:0;color:var(--forest);font-weight:700}

/* === TEMPLATES === */
.templates-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.template-card{border-radius:var(--radius-lg);overflow:hidden;border:2px solid var(--border);
  cursor:pointer;transition:all 0.3s}
.template-card:hover,.template-card.selected{border-color:var(--forest);
  box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.template-preview{height:200px;position:relative;overflow:hidden}
.template-info{padding:1rem 1.25rem;background:var(--white)}
.template-info h4{font-size:0.95rem;font-family:var(--font-body);font-weight:600}
.template-info p{font-size:0.75rem;color:var(--text-light)}
/* Template preview colors */
.tpl-botanical .template-preview{background:linear-gradient(135deg,#FDF8F4,#F5EDE6);
  display:flex;flex-direction:column;padding:1.5rem}
.tpl-botanical .tpl-header{width:60%;height:8px;border-radius:4px;background:#C4725A;margin-bottom:0.75rem}
.tpl-botanical .tpl-line{width:80%;height:5px;border-radius:3px;background:rgba(196,114,90,0.15);margin-bottom:0.5rem}
.tpl-botanical .tpl-line:nth-child(3){width:50%}
.tpl-botanical .tpl-cards{display:flex;gap:0.5rem;margin-top:auto}
.tpl-botanical .tpl-cards div{flex:1;height:40px;border-radius:6px;background:rgba(196,114,90,0.1);border:1px solid rgba(196,114,90,0.15)}

.tpl-clinical .template-preview{background:linear-gradient(135deg,#F0F5FF,#E8EEF8);
  display:flex;flex-direction:column;padding:1.5rem}
.tpl-clinical .tpl-header{width:60%;height:8px;border-radius:4px;background:#3366CC;margin-bottom:0.75rem}
.tpl-clinical .tpl-line{width:80%;height:5px;border-radius:3px;background:rgba(51,102,204,0.12);margin-bottom:0.5rem}
.tpl-clinical .tpl-line:nth-child(3){width:50%}
.tpl-clinical .tpl-cards{display:flex;gap:0.5rem;margin-top:auto}
.tpl-clinical .tpl-cards div{flex:1;height:40px;border-radius:6px;background:rgba(51,102,204,0.08);border:1px solid rgba(51,102,204,0.12)}

.tpl-minimal .template-preview{background:linear-gradient(135deg,#FAF9F6,#F0EDE8);
  display:flex;flex-direction:column;padding:1.5rem}
.tpl-minimal .tpl-header{width:60%;height:8px;border-radius:4px;background:#2C2C2C;margin-bottom:0.75rem}
.tpl-minimal .tpl-line{width:80%;height:5px;border-radius:3px;background:rgba(44,44,44,0.08);margin-bottom:0.5rem}
.tpl-minimal .tpl-line:nth-child(3){width:50%}
.tpl-minimal .tpl-cards{display:flex;gap:0.5rem;margin-top:auto}
.tpl-minimal .tpl-cards div{flex:1;height:40px;border-radius:6px;background:rgba(44,44,44,0.04);border:1px solid rgba(44,44,44,0.08)}

/* === DASHBOARD === */
.dashboard{min-height:100vh;padding-top:var(--nav-height);background:var(--sand)}
.dash-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - var(--nav-height))}
.dash-sidebar{background:var(--white);border-right:1px solid var(--border);padding:1.5rem 0}
.dash-sidebar-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.5rem;
  font-size:0.85rem;color:var(--text-light);cursor:pointer;transition:all 0.2s;
  border-left:3px solid transparent}
.dash-sidebar-item:hover{color:var(--text);background:var(--sand)}
.dash-sidebar-item.active{color:var(--forest);font-weight:600;background:rgba(45,90,61,0.04);
  border-left-color:var(--forest)}
.dash-main{padding:2rem clamp(1.5rem,3vw,2.5rem)}
.dash-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);
  padding:2rem;margin-bottom:1.5rem}
.dash-card h3{font-size:1.3rem;margin-bottom:1.5rem}

/* === WIZARD === */
.wizard-progress{display:flex;gap:0.25rem;margin-bottom:2.5rem}
.wizard-step{flex:1;height:4px;border-radius:2px;background:var(--border);transition:all 0.3s}
.wizard-step.done{background:var(--forest)}
.wizard-step.current{background:var(--gold)}
.wizard-header{margin-bottom:2rem}
.wizard-header h3{font-size:1.5rem;margin-bottom:0.35rem}
.wizard-header p{font-size:0.9rem;color:var(--text-light)}
.wizard-actions{display:flex;justify-content:space-between;margin-top:2rem;padding-top:1.5rem;
  border-top:1px solid var(--border)}

/* === SERVICE PICKER === */
.service-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem}
.service-chip{padding:0.6rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);
  background:var(--white);cursor:pointer;transition:all 0.2s;font-size:0.82rem;
  text-align:center}
.service-chip:hover{border-color:var(--forest)}
.service-chip.selected{background:rgba(45,90,61,0.06);border-color:var(--forest);
  color:var(--forest);font-weight:500}
.service-chip .chip-icon{font-size:1.2rem;margin-bottom:0.25rem}

/* === DOCTOR SITE === */
.doc-site{min-height:100vh}
/* Template: Botanical */
.doc-botanical{--accent:#C4725A;--accent-light:#E8967A;--accent-bg:rgba(196,114,90,0.06);
  --doc-bg:#FDF8F4;--doc-card:#FFFFFF;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
.doc-botanical .doc-hero{min-height:80vh;display:flex;align-items:center;
  padding:calc(var(--nav-height) + 3rem) clamp(1.5rem,5vw,4rem) 3rem;
  background:var(--doc-bg);position:relative;overflow:hidden}
.doc-botanical .doc-hero::before{content:'';position:absolute;top:-100px;right:-100px;
  width:500px;height:500px;border-radius:50%;background:rgba(196,114,90,0.06)}
/* Template: Clinical */
.doc-clinical{--accent:#3366CC;--accent-light:#5588DD;--accent-bg:rgba(51,102,204,0.05);
  --doc-bg:#F6F8FC;--doc-card:#FFFFFF;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
/* Template: Minimal */
.doc-minimal{--accent:#2C2C2C;--accent-light:#555;--accent-bg:rgba(44,44,44,0.03);
  --doc-bg:#FAFAF8;--doc-card:#FFFFFF;font-family:'Plus Jakarta Sans',system-ui,sans-serif}

.doc-hero-content{max-width:1200px;margin:0 auto;width:100%;display:grid;
  grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.doc-name{font-size:clamp(2.2rem,4.5vw,3.2rem);margin-bottom:0.5rem}
.doc-creds{font-family:var(--font-display);font-style:italic;color:var(--accent);
  font-size:1.05rem;margin-bottom:0.75rem}
.doc-bio{font-size:0.92rem;color:var(--text-light);line-height:1.7;margin-bottom:2rem}
.doc-stats{display:flex;gap:2rem;margin-bottom:2rem;flex-wrap:wrap}
.doc-stat-num{font-family:var(--font-display);font-size:1.8rem;color:var(--accent);line-height:1}
.doc-stat-label{font-size:0.7rem;color:var(--text-light);text-transform:uppercase;
  letter-spacing:0.06em;margin-top:0.2rem}
.doc-photo{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:var(--radius-xl);
  background:linear-gradient(135deg,var(--accent-bg),rgba(0,0,0,0.03));
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  font-family:var(--font-display);font-size:5rem;color:var(--accent);
  overflow:hidden;border:1px solid var(--border)}
.doc-photo img{width:100%;height:100%;object-fit:cover}

.doc-section{padding:clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem)}
.doc-section-inner{max-width:1200px;margin:0 auto}
.doc-section-title{font-size:clamp(1.8rem,3vw,2.4rem);text-align:center;margin-bottom:2.5rem}
.doc-services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem}
.doc-service-card{padding:1.75rem;border-radius:var(--radius-lg);background:var(--doc-card);
  border:1px solid var(--border);transition:all 0.3s}
.doc-service-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.doc-service-card h4{font-size:1.1rem;margin-bottom:0.35rem}
.doc-service-card p{font-size:0.82rem;color:var(--text-light);line-height:1.6}
.doc-service-fee{margin-top:0.75rem;font-weight:600;color:var(--accent)}

/* Booking with payment */
.doc-booking{background:var(--accent-bg)}
.doc-booking-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.doc-booking-form{display:flex;flex-direction:column;gap:0.75rem}
.doc-booking-info{padding:2rem;border-radius:var(--radius-lg);background:var(--accent);color:white}
.doc-booking-info h3{color:white;font-size:1.4rem;margin-bottom:1rem}
.doc-booking-info-item{display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:1rem}
.doc-booking-info-item .icon{font-size:1.1rem;margin-top:0.1rem}
.doc-booking-info-item p{font-size:0.85rem;opacity:0.9}
.doc-booking-info-item strong{font-weight:600;opacity:1;display:block}

/* Payment modal */
.pay-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;

.pay-details{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem}
.pay-row{display:flex;justify-content:space-between;font-size:0.85rem;

.pay-row:last-child{border:none;font-weight:600;color:var(--charcoal)}

/* === AUTH === */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem;background:var(--sand)}
.auth-card{width:100%;max-width:420px;padding:2.5rem;background:var(--white);

.auth-card h2{font-size:1.8rem;margin-bottom:0.35rem;text-align:center}

.auth-divider{text-align:center;color:var(--text-light);font-size:0.78rem;

.auth-divider::before,.auth-divider::after{content:'';position:absolute;top:50%;

.auth-divider::before{left:0}.auth-divider::after{right:0}
.google-btn{width:100%;padding:0.75rem;border-radius:var(--radius);

.auth-toggle{text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-light)}

.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);

// ─── AUTH PAGE ──────────────────────────────────────────────
function AuthPage({setPage,onAuth}){
  const [mode,setMode]=useState('signup');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const handleEmail=async(e)=>{
    e.preventDefault();setErr('');setLoading(true);
    try{
      if(mode==='signup') await auth.createUserWithEmailAndPassword(email,pw);
      else await auth.signInWithEmailAndPassword(email,pw);
    }catch(e){
      const msgs={'auth/email-already-in-use':'Email already registered. Try logging in.',
        'auth/wrong-password':'Incorrect password.','auth/user-not-found':'No account found. Try signing up.',
        'auth/weak-password':'Password must be at least 6 characters.'};
      setErr(msgs[e.code]||e.message);
    }
    setLoading(false);
  };

  const handleGoogle=async()=>{
    setErr('');
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}
    catch(e){setErr(e.message)}
  };

  return h('div',{className:'auth-page'},
    h('form',{className:'auth-card animate-up',onSubmit:handleEmail},
      h('div',{style:{textAlign:'center',marginBottom:'0.5rem'}},
        h('span',{style:{fontFamily:'var(--font-display)',fontSize:'1.8rem',color:'var(--forest)'}},
          'Doc',h('em',{style:{fontStyle:'italic',color:'var(--gold)'}},'Page'))),
      h('h2',null,mode==='signup'?'Create your website':'Welcome back'),
      h('p',{className:'subtitle'},mode==='signup'?'Start building in under 5 minutes':'Log in to your dashboard'),
      h('button',{type:'button',className:'google-btn',onClick:handleGoogle},
        '🔵 Continue with Google'),
      h('div',{className:'auth-divider'},'or'),
      err&&h('div',{className:'auth-error'},err),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'0.75rem'}},
        h('div',{className:'form-group'},
          h('input',{className:'form-input',type:'email',placeholder:'Email address',required:true,
            value:email,onChange:e=>setEmail(e.target.value)})),
        h('div',{className:'form-group'},
          h('input',{className:'form-input',type:'password',placeholder:'Password (min 6 chars)',
            required:true,minLength:6,value:pw,onChange:e=>setPw(e.target.value)})),
        h('button',{type:'submit',className:'btn btn-primary btn-block',disabled:loading},
          loading?h('div',{className:'spinner'}):mode==='signup'?'Create Account':'Log In')),
      h('div',{className:'auth-toggle'},
        mode==='signup'?'Already have an account? ':'Don\'t have an account? ',
        h('button',{type:'button',onClick:()=>{setMode(mode==='signup'?'login':'signup');setErr('')}},
          mode==='signup'?'Log in':'Sign up'))))
  ;
}

// ─── DASHBOARD ──────────────────────────────────────────────
function Dashboard({user,setPage}){
  const [tab,setTab]=useState('wizard');
  const [siteData,setSiteData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);

  // Wizard state
  const [step,setStep]=useState(0);
  const [form,setForm]=useState({
    name:'',qualifications:[],specialization:'',registration:'',
    clinicName:'',address:'',city:'Bangalore',state:'Karnataka',phone:'',email:'',
    hours:'Mon-Sat: 10 AM - 6 PM',languages:['English','Hindi'],
    services:[],customServices:[],
    bio:'',experience:'',publications:'',
    consultFee:'500',followupFee:'300',razorpayKey:'',
    template:'botanical',slug:'',published:false
  });

  useEffect(()=>{
    if(!user)return;
    db.collection('docpages').doc(user.uid).get().then(doc=>{
      if(doc.exists){
        const data=doc.data();
        setForm(f=>({...f,...data}));
        setSiteData(data);
        if(data.published)setTab('overview');
      }
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[user]);

  const updateForm=(k,v)=>setForm(f=>({...f,[k]:v}));

  const saveToFirestore=async(extra={})=>{
    setSaving(true);
    const data={...form,...extra,uid:user.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(!data.slug)data.slug=slugify(data.name||user.displayName||'doctor');
    await db.collection('docpages').doc(user.uid).set(data,{merge:true});
    setForm(f=>({...f,...data}));
    setSiteData(data);
    setSaving(false);
    return data;
  };

  const publish=async()=>{
    const data=await saveToFirestore({published:true});
    setTab('overview');
  };

  const totalSteps=5;
  const nextStep=async()=>{
    if(step<totalSteps-1){setStep(s=>s+1)}
    else await publish();
  };

  if(loading) return h('div',{className:'dashboard',style:{display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{className:'spinner',style:{borderColor:'rgba(45,90,61,0.2)',borderTopColor:'var(--forest)',width:32,height:32}}));

  const sideItems=[
    {id:'overview',icon:'📊',label:'Overview'},
    {id:'wizard',icon:'✏️',label:'Edit Site'},
    {id:'preview',icon:'👁️',label:'Preview'},
    {id:'payments',icon:'💳',label:'Payments'},
    {id:'analytics',icon:'📈',label:'Analytics'}
  ];

  return h('div',{className:'dashboard'},
    h('div',{className:'dash-layout'},
      h('aside',{className:'dash-sidebar'},
        h('div',{style:{padding:'0 1.5rem 1.5rem',borderBottom:'1px solid var(--border)',marginBottom:'1rem'}},
          h('div',{style:{fontSize:'0.82rem',fontWeight:600,color:'var(--charcoal)'}},
            form.name||user.displayName||'Doctor'),
          h('div',{style:{fontSize:'0.75rem',color:'var(--text-light)'}},
            form.published?
              h('span',{className:'publish-status live'},'● Live'):
              h('span',{className:'publish-status draft'},'● Draft'))),
        sideItems.map(item=>h('div',{key:item.id,
          className:`dash-sidebar-item ${tab===item.id?'active':''}`,
          onClick:()=>setTab(item.id)},item.icon,' ',item.label))),

      h('main',{className:'dash-main'},
        tab==='overview'&&h(DashOverview,{form,setTab,setPage}),
        tab==='wizard'&&h(Wizard,{form,updateForm,step,setStep,nextStep,totalSteps,saving,saveToFirestore}),
        tab==='preview'&&h('div',null,
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}},
            h('h2',{style:{fontFamily:'var(--font-display)',fontSize:'1.5rem'}},'Site Preview'),
            h('a',{href:'#/dr/'+form.slug,target:'_blank',className:'btn btn-primary btn-sm'},'Open Full Preview')),
          h('div',{style:{background:'var(--white)',borderRadius:'var(--radius-lg)',border:'1px solid var(--border)',overflow:'hidden',minHeight:400}},
            h('div',{style:{padding:'2rem',textAlign:'center',color:'var(--text-light)'}},
              'Preview your site at: ',h('a',{href:'#/dr/'+form.slug,style:{color:'var(--forest)',fontWeight:600}},
                'docpage.vercel.app/dr/',form.slug)))),
        tab==='payments'&&h(PaymentsTab,{form,updateForm,saveToFirestore,saving}),
        tab==='analytics'&&h('div',{className:'dash-card'},
          h('h3',null,'Analytics'),
          h('p',{style:{color:'var(--text-light)'}},'Analytics will be available once your site receives visitors. Share your link to get started!'))
      ))
  );
}

function DashOverview({form,setTab,setPage}){

// ─── DOCTOR SITE (Generated) ────────────────────────────────
function DoctorSite({slug}){
  const [doc,setDoc]=useState(null);
  const [loading,setLoading]=useState(true);
  const [bookingForm,setBookingForm]=useState({name:'',phone:'',date:'',time:'',service:'',type:'consultation'});
  const [showPay,setShowPay]=useState(false);

  useEffect(()=>{
    db.collection('docpages').where('slug','==',slug).where('published','==',true)
      .limit(1).get().then(snap=>{
        if(!snap.empty)setDoc(snap.docs[0].data());
        setLoading(false);
      }).catch(()=>setLoading(false));
  },[slug]);

  if(loading) return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{className:'spinner',style:{borderColor:'rgba(45,90,61,0.2)',borderTopColor:'var(--forest)',width:32,height:32}}));

  if(!doc) return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'1rem'}},
    h('div',{style:{fontSize:'3rem'}},'🔍'),
    h('h2',{style:{fontFamily:'var(--font-display)',fontSize:'1.8rem'}},'Site not found'),
    h('p',{style:{color:'var(--text-light)'}},'This doctor page doesn\'t exist or hasn\'t been published yet.'),
    h('a',{href:'#/',className:'btn btn-primary'},'Go to DocPage'));

  const tpl = doc.template||'botanical';
  const accent = TEMPLATES.find(t=>t.id===tpl)?.accent||'#2D5A3D';
  const fee = bookingForm.type==='followup'?(doc.followupFee||300):(doc.consultFee||500);

  const handleBook=(e)=>{
    e.preventDefault();
    if(doc.razorpayKey){
      setShowPay(true);
    } else {
      // WhatsApp fallback
      const msg=`Hi ${doc.name}, I'd like to book an appointment.\n\nName: ${bookingForm.name}\nPhone: ${bookingForm.phone}\nDate: ${bookingForm.date}\nTime: ${bookingForm.time}\nService: ${bookingForm.service}`;
      window.open(`https://wa.me/91${doc.phone?.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`,'_blank');
    }
  };

  const initiatePayment=()=>{
    if(!window.Razorpay){alert('Payment gateway loading...');return}
    const options={
      key:doc.razorpayKey,
      amount:fee*100,
      currency:'INR',
      name:doc.name||'Doctor Consultation',
      description:`${bookingForm.type==='followup'?'Follow-up':'Consultation'} - ${bookingForm.service||'General'}`,
      handler:function(response){
        setShowPay(false);
        alert('Payment successful! Booking confirmed.\nPayment ID: '+response.razorpay_payment_id);
        // Save booking to Firestore
        db.collection('bookings').add({
          doctorId:doc.uid,patientName:bookingForm.name,phone:bookingForm.phone,
          date:bookingForm.date,time:bookingForm.time,service:bookingForm.service,
          amount:fee,paymentId:response.razorpay_payment_id,
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      prefill:{name:bookingForm.name,contact:bookingForm.phone},
      theme:{color:accent}
    };
    new window.Razorpay(options).open();
  };

  const initials=(doc.name||'Dr').split(' ').filter(w=>w.length>1).map(w=>w[0]).join('').substring(0,2);

  return h('div',{className:`doc-site doc-${tpl}`,style:{'--accent':accent}},
    // Hero
    h('section',{className:'doc-hero',style:{background:'var(--doc-bg)',minHeight:'80vh',
      display:'flex',alignItems:'center',padding:'calc(var(--nav-height) + 3rem) clamp(1.5rem,5vw,4rem) 3rem',
      position:'relative',overflow:'hidden'}},
      h('div',{style:{position:'absolute',top:'-100px',right:'-100px',width:'500px',height:'500px',
        borderRadius:'50%',background:`rgba(${tpl==='botanical'?'196,114,90':tpl==='clinical'?'51,102,204':'44,44,44'},0.05)`}}),
      h('div',{className:'doc-hero-content'},
        h('div',{className:'animate-up'},
          h('div',{style:{display:'inline-block',padding:'0.35rem 1rem',borderRadius:'100px',
            background:'var(--accent-bg)',color:accent,fontSize:'0.75rem',fontWeight:600,
            letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:'1.25rem'}},
            doc.specialization||'Doctor'),
          h('h1',{className:'doc-name',style:{fontFamily:'var(--font-display)'}},doc.name),
          h('p',{className:'doc-creds',style:{color:accent}},
            (doc.qualifications||[]).join(', ')),
          h('p',{className:'doc-bio'},doc.bio||'Experienced medical professional providing comprehensive patient care.'),
          h('div',{className:'doc-stats'},
            doc.experience&&{n:doc.experience+'+',l:'Years Experience'},
            doc.services&&{n:doc.services.length,l:'Services'},
            doc.languages&&{n:doc.languages.length,l:'Languages'}
          ).filter(Boolean).map((s,i)=>h('div',{key:i},
            h('div',{className:'doc-stat-num',style:{color:accent}},s.n),
            h('div',{className:'doc-stat-label'},s.l))),
          h('div',{style:{display:'flex',gap:'1rem',flexWrap:'wrap'}},
            h('a',{href:'#booking-section',className:'btn',
              style:{background:accent,color:'white',boxShadow:`0 4px 12px ${accent}33`}},
              'Book Appointment'),
            doc.phone&&h('a',{className:'btn btn-secondary',
              href:`https://wa.me/91${doc.phone.replace(/\D/g,'')}`,target:'_blank'},
              '💬 WhatsApp'))),
        h('div',{className:'animate-up d2',style:{display:'flex',justifyContent:'center'}},
          h('div',{className:'doc-photo'},initials)))),

    // Services
    doc.services?.length>0&&h('section',{className:'doc-section',style:{background:'var(--accent-bg)'}},
      h('div',{className:'doc-section-inner'},
        h('h2',{className:'doc-section-title'},'Services'),
        h('div',{className:'doc-services-grid'},
          doc.services.map((s,i)=>h('div',{key:i,className:'doc-service-card'},
            h('h4',{style:{fontFamily:'var(--font-display)',fontSize:'1.1rem'}},s),
            h('div',{className:'doc-service-fee',style:{color:accent}},
              '₹',doc.consultFee||500,' onwards')))))),

    // Booking
    h('section',{id:'booking-section',className:'doc-section'},
      h('div',{className:'doc-section-inner'},
        h('h2',{className:'doc-section-title'},'Book an Appointment'),
        h('div',{className:'doc-booking-grid'},
          h('form',{className:'doc-booking-form',onSubmit:handleBook},
            h('div',{className:'form-row'},
              h('div',{className:'form-group'},
                h('label',{className:'form-label'},'Your Name'),
                h('input',{className:'form-input',required:true,placeholder:'Full name',
                  value:bookingForm.name,onChange:e=>setBookingForm(f=>({...f,name:e.target.value}))})),
              h('div',{className:'form-group'},
                h('label',{className:'form-label'},'Phone'),
                h('input',{className:'form-input',required:true,placeholder:'+91 XXXXX XXXXX',
                  value:bookingForm.phone,onChange:e=>setBookingForm(f=>({...f,phone:e.target.value}))}))),
            h('div',{className:'form-row'},
              h('div',{className:'form-group'},
                h('label',{className:'form-label'},'Date'),
                h('input',{className:'form-input',type:'date',required:true,
                  value:bookingForm.date,onChange:e=>setBookingForm(f=>({...f,date:e.target.value}))})),
              h('div',{className:'form-group'},
                h('label',{className:'form-label'},'Time'),
                h('select',{className:'form-input',value:bookingForm.time,
                  onChange:e=>setBookingForm(f=>({...f,time:e.target.value}))},
                  h('option',{value:''},'Select time'),
                  ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM'].map(t=>
                    h('option',{key:t,value:t},t))))),
            doc.services?.length>0&&h('div',{className:'form-group'},
              h('label',{className:'form-label'},'Service'),
              h('select',{className:'form-input',value:bookingForm.service,
                onChange:e=>setBookingForm(f=>({...f,service:e.target.value}))},

                  className:`service-chip ${bookingForm.type===t?'selected':''}`,
                  onClick:()=>setBookingForm(f=>({...f,type:t}))},
                  t==='consultation'?`First Visit — ₹${doc.consultFee||500}`:`Follow-up — ₹${doc.followupFee||300}`)))),
            h('button',{type:'submit',className:'btn btn-block',
              style:{background:accent,color:'white',marginTop:'0.5rem'}},
              doc.razorpayKey?`Pay ₹${fee} & Book`:'Book via WhatsApp')),
          h('div',{className:'doc-booking-info',style:{background:accent}},
            h('h3',{style:{color:'white'}},'Visit Information'),
            [{icon:'📍',title:doc.clinicName||'Clinic',text:doc.address?`${doc.address}, ${doc.city}`:doc.city||''},
             {icon:'📞',title:doc.phone||'Contact',text:'Call or WhatsApp'},
             {icon:'✉️',title:doc.email||'Email',text:'For queries and reports'},
             {icon:'🕐',title:doc.hours||'Working Hours',text:''},
             doc.languages?.length>0&&{icon:'🌐',title:'Languages',text:doc.languages.join(' • ')}
            ].filter(Boolean).map((item,i)=>h('div',{key:i,className:'doc-booking-info-item'},
              h('span',{className:'icon'},item.icon),
              h('div',null,h('strong',null,item.title),item.text&&h('p',null,item.text)))))))),

    // Footer
    h('footer',{style:{padding:'2rem',textAlign:'center',borderTop:'1px solid var(--border)'}},
      h('p',{style:{fontSize:'0.78rem',color:'var(--text-light)'}},
        '© ',new Date().getFullYear(),' ',doc.name,' — ',doc.clinicName||doc.city),
      h('p',{style:{fontSize:'0.68rem',color:'var(--text-light)',marginTop:'0.25rem'}},
        'Powered by ',h('a',{href:'#/',style:{color:'var(--forest)',fontWeight:600}},'DocPage'))),

    // Payment modal
    showPay&&h('div',{className:'pay-modal',onClick:e=>{if(e.target===e.currentTarget)setShowPay(false)}},
      h('div',{className:'pay-card animate-up'},
        h('div',{style:{textAlign:'center'}},
          h('div',{style:{fontSize:'2rem',marginBottom:'0.5rem'}},'💳'),
          h('h3',{style:{fontFamily:'var(--font-display)',fontSize:'1.4rem'}},'Confirm Booking')),
        h('div',{className:'pay-amount'},'₹',fee),
        h('div',{className:'pay-details'},
          h('div',{className:'pay-row'},h('span',null,'Doctor'),h('span',null,doc.name)),
          h('div',{className:'pay-row'},h('span',null,'Service'),h('span',null,bookingForm.service||'Consultation')),
          h('div',{className:'pay-row'},h('span',null,'Date'),h('span',null,bookingForm.date)),
          h('div',{className:'pay-row'},h('span',null,'Type'),h('span',null,bookingForm.type==='followup'?'Follow-up':'First Visit')),
          h('div',{className:'pay-row'},h('span',null,'Total'),h('span',null,'₹'+fee))),
        h('button',{className:'btn btn-primary btn-block btn-lg',onClick:initiatePayment},
          'Pay with Razorpay'),
        h('button',{className:'btn btn-secondary btn-block',style:{marginTop:'0.5rem'},
          onClick:()=>setShowPay(false)},'Cancel')))
  );
}

// ─── DEMO PAGE ──────────────────────────────────────────────
function DemoPage({setPage}){
  return h(DoctorSite,{slug:'demo'});
}

// ─── APP ────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [page,setPage]=useState('landing');
  const [routeSlug,setRouteSlug]=useState(null);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>{
      setUser(u);setAuthReady(true);
      if(u&&page==='auth')setPage('dashboard');
    });
    return unsub;
  },[]);

  // Hash routing
  useEffect(()=>{
    const handleHash=()=>{
      const hash=window.location.hash.slice(1)||'/';
      if(hash.startsWith('/dr/')){
        setRouteSlug(hash.replace('/dr/',''));
        setPage('doctorsite');
      } else if(hash==='/dashboard'){
        setPage('dashboard');
      } else if(hash==='/auth'){
        setPage('auth');
      }
    };
    handleHash();
    window.addEventListener('hashchange',handleHash);
    return ()=>window.removeEventListener('hashchange',handleHash);
  },[]);

  useEffect(()=>{
    if(page==='doctorsite')return;
    window.scrollTo({top:0,behavior:'smooth'});
  },[page]);

  // Seed demo data
  useEffect(()=>{
    db.collection('docpages').where('slug','==','demo').limit(1).get().then(snap=>{
      if(snap.empty){
        db.collection('docpages').doc('demo').set({
          name:'Dr. Namratha G',qualifications:['MBBS','MD'],specialization:'Dermatologist',
          clinicName:'Kaya Clinic',city:'Bangalore',state:'Karnataka',
          phone:'8095320110',email:'gsnam96@gmail.com',
          hours:'Mon-Sat: 10 AM - 6 PM',languages:['English','Kannada','Telugu','Hindi'],
          services:['Acne Treatment','Laser Hair Removal','Chemical Peel','PRP Therapy','Botox & Fillers','Dermoscopy','Vitiligo Treatment','Scar Treatment'],
          bio:'Dr. Namratha G is a qualified dermatologist with extensive training in clinical, surgical, and aesthetic dermatology. IADVL member with 3 peer-reviewed publications.',
          experience:'7',consultFee:'800',followupFee:'500',
          template:'botanical',slug:'demo',published:true,uid:'demo',
          registration:'KMC/XXXXX'
        });
      }
    }).catch(()=>{});
  },[]);

  if(!authReady) return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{className:'spinner',style:{borderColor:'rgba(45,90,61,0.2)',borderTopColor:'var(--forest)',width:32,height:32}}));

  if(page==='doctorsite') return h(DoctorSite,{slug:routeSlug});

  return h(Fragment,null,
    h(Nav,{user,page,setPage}),
    page==='landing'&&h(Landing,{setPage}),
    page==='auth'&&h(AuthPage,{setPage}),
    page==='dashboard'&&(user?h(Dashboard,{user,setPage}):h(AuthPage,{setPage})),
    page==='demo'&&h(DemoPage,{setPage})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
