<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocPage — AI-Powered Websites for Doctors</title>
<meta name="description" content="Upload your resume, let AI craft your professional medical website. Online booking, payments, beautiful templates. Live in minutes.">
<meta name="theme-color" content="#2D5A3D">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<!-- PDF.js for resume parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib)pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --forest:#2D5A3D;--forest-light:#3D7A52;--forest-dark:#1E3D2A;
  --gold:#C4A355;--gold-light:#D4B976;--gold-dark:#A68A3E;
  --sand:#F7F3ED;--sand-dark:#EDE5D8;
  --ivory:#FFFDF8;--white:#FFFFFF;
  --charcoal:#1C1C1A;--text:#3A3A36;--text-light:#7A7A72;
  --border:rgba(44,44,40,0.08);--border-strong:rgba(44,44,40,0.15);
  --shadow:0 2px 16px rgba(0,0,0,0.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.1);
  --radius:10px;--radius-lg:16px;--radius-xl:24px;
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Plus Jakarta Sans',system-ui,sans-serif;
  --nav-height:64px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--ivory);color:var(--text);
  line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:400;line-height:1.2;color:var(--charcoal)}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font-body);font-size:0.9rem}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.animate-up{animation:fadeUp 0.6s ease both}
.d1{animation-delay:0.1s}.d2{animation-delay:0.2s}.d3{animation-delay:0.3s}
.d4{animation-delay:0.4s}.d5{animation-delay:0.5s}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:0 clamp(1.25rem,4vw,3rem)}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-height);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1.25rem,4vw,3rem);background:rgba(255,253,248,0.9);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--font-display);font-size:1.5rem;color:var(--forest);cursor:pointer}
.nav-logo em{font-style:italic;color:var(--gold)}
.nav-links{display:flex;gap:0.5rem;align-items:center}
.nav-btn{padding:0.45rem 1rem;border-radius:100px;font-size:0.82rem;font-weight:500;
  color:var(--text-light);transition:all 0.2s}
.nav-btn:hover{color:var(--forest)}
.nav-btn.primary{background:var(--forest);color:white;padding:0.5rem 1.25rem}
.nav-btn.primary:hover{background:var(--forest-light)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.75rem 1.75rem;
  border-radius:100px;font-size:0.88rem;font-weight:500;transition:all 0.25s}
.btn-primary{background:var(--forest);color:white;box-shadow:0 4px 12px rgba(45,90,61,0.2)}
.btn-primary:hover{background:var(--forest-light);transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(45,90,61,0.3)}
.btn-secondary{border:1.5px solid var(--border-strong);color:var(--text);background:var(--white)}
.btn-secondary:hover{border-color:var(--forest);color:var(--forest)}
.btn-gold{background:var(--gold);color:white;box-shadow:0 4px 12px rgba(196,163,85,0.25)}
.btn-gold:hover{background:var(--gold-dark)}
.btn-outline{border:1.5px solid var(--forest);color:var(--forest)}
.btn-outline:hover{background:var(--forest);color:white}
.btn-sm{padding:0.5rem 1.25rem;font-size:0.8rem}
.btn-lg{padding:0.9rem 2.25rem;font-size:1rem}
.btn-block{width:100%;justify-content:center}
.btn-ai{background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;
  box-shadow:0 4px 12px rgba(99,102,241,0.3)}
.btn-ai:hover{box-shadow:0 6px 20px rgba(99,102,241,0.4);transform:translateY(-1px)}

/* Form */
.form-group{display:flex;flex-direction:column;gap:0.3rem}
.form-label{font-size:0.75rem;font-weight:600;color:var(--text-light);
  text-transform:uppercase;letter-spacing:0.06em}
.form-input{padding:0.75rem 1rem;border-radius:var(--radius);
  border:1.5px solid var(--border);background:var(--white);color:var(--text);transition:all 0.2s}
.form-input:focus{outline:none;border-color:var(--forest);
  box-shadow:0 0 0 3px rgba(45,90,61,0.08)}
textarea.form-input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-hint{font-size:0.72rem;color:var(--text-light);margin-top:0.15rem}

/* AI badge */
.ai-badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.15rem 0.5rem;
  border-radius:100px;background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(139,92,246,0.1));
  color:#6366F1;font-size:0.65rem;font-weight:600;letter-spacing:0.04em}

/* Skeleton shimmer */
.skeleton{background:linear-gradient(90deg,var(--sand) 25%,var(--sand-dark) 50%,var(--sand) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius);min-height:20px}

/* Landing */
.hero-landing{min-height:100vh;display:flex;align-items:center;
  padding:calc(var(--nav-height) + 4rem) 0 4rem;position:relative;overflow:hidden}
.hero-landing::before{content:'';position:absolute;top:-20%;right:-10%;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,0.06),transparent 70%)}
.hero-landing::after{content:'';position:absolute;bottom:-15%;left:-5%;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(196,163,85,0.06),transparent 70%)}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;position:relative;z-index:1}
.hero-text h1{font-size:clamp(2.5rem,5vw,3.8rem);line-height:1.08;margin-bottom:1.25rem;letter-spacing:-0.02em}
.hero-text h1 em{font-style:italic;color:var(--forest)}
.hero-text p{font-size:1.05rem;color:var(--text-light);line-height:1.7;margin-bottom:2rem;max-width:480px}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.hero-trust{display:flex;align-items:center;gap:1rem}
.hero-avatars{display:flex}
.hero-avatars span{width:32px;height:32px;border-radius:50%;border:2px solid var(--ivory);
  display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;
  color:white;margin-left:-8px}
.hero-avatars span:first-child{margin-left:0}
.hero-trust-text{font-size:0.82rem;color:var(--text-light)}
.hero-trust-text strong{color:var(--text);font-weight:600}
.hero-preview{position:relative}
.preview-browser{background:var(--white);border-radius:var(--radius-lg);
  border:1px solid var(--border);box-shadow:var(--shadow-lg);overflow:hidden}
.preview-toolbar{height:36px;background:var(--sand);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:6px}
.preview-dot{width:8px;height:8px;border-radius:50%}
.preview-dot.r{background:#FF6B6B}.preview-dot.y{background:#FFD93D}.preview-dot.g{background:#6BCB77}
.preview-url{flex:1;margin-left:8px;padding:4px 12px;border-radius:6px;
  background:var(--white);font-size:0.65rem;color:var(--text-light);border:1px solid var(--border)}
.preview-body{padding:1.5rem;min-height:320px}
.preview-card{padding:1.25rem;border-radius:var(--radius);border:1px solid var(--border);
  margin-bottom:0.75rem;animation:fadeUp 0.5s ease both}
.preview-card h4{font-family:var(--font-display);font-size:1.1rem;margin-bottom:0.25rem}
.preview-card p{font-size:0.75rem;color:var(--text-light)}
.preview-tags{display:flex;gap:0.35rem;margin-top:0.5rem;flex-wrap:wrap}
.preview-tag{padding:0.2rem 0.5rem;border-radius:100px;font-size:0.62rem;
  background:rgba(99,102,241,0.08);color:#6366F1;font-weight:500}
.preview-hero-mini{display:flex;gap:1rem;align-items:center;margin-bottom:1rem}
.preview-avatar{width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,#6366F1,#8B5CF6);
  display:flex;align-items:center;justify-content:center;color:white;
  font-family:var(--font-display);font-size:1.2rem}
.preview-badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:100px;
  background:rgba(196,163,85,0.12);color:var(--gold-dark);font-size:0.6rem;
  font-weight:600;text-transform:uppercase;letter-spacing:0.06em}

/* Sections */
.section{padding:clamp(4rem,8vw,7rem) 0}
.section-header{text-align:center;margin-bottom:3rem}
.section-tag{display:inline-block;font-size:0.7rem;font-weight:600;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--forest);margin-bottom:0.5rem}
.section-title{font-size:clamp(2rem,4vw,2.8rem);letter-spacing:-0.02em}
.section-desc{font-size:0.95rem;color:var(--text-light);max-width:560px;margin:0.75rem auto 0}
.section-alt{background:var(--sand)}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.feature-card{padding:2rem;border-radius:var(--radius-lg);background:var(--white);
  border:1px solid var(--border);transition:all 0.3s}
.feature-card:hover{border-color:var(--forest);transform:translateY(-3px);box-shadow:var(--shadow)}
.feature-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;margin-bottom:1.25rem;background:rgba(99,102,241,0.08)}
.feature-card h3{font-size:1.2rem;margin-bottom:0.5rem}
.feature-card p{font-size:0.85rem;color:var(--text-light);line-height:1.7}
.steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem}
.step{text-align:center;position:relative}
.step::after{content:'';position:absolute;top:28px;left:calc(50% + 28px);
  width:calc(100% - 56px);height:2px;background:var(--border)}
.step:last-child::after{display:none}
.step-num{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--font-display);font-size:1.4rem;
  background:var(--forest);color:white;margin:0 auto 1rem;position:relative;z-index:1}
.step h3{font-size:1.1rem;margin-bottom:0.35rem}
.step p{font-size:0.82rem;color:var(--text-light)}

/* Pricing */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:960px;margin:0 auto}
.price-card{padding:2.5rem 2rem;border-radius:var(--radius-xl);background:var(--white);
  border:1px solid var(--border);position:relative;transition:all 0.3s}
.price-card.featured{border-color:var(--forest);box-shadow:var(--shadow-lg);transform:scale(1.03)}
.price-card.featured::before{content:'Most Popular';position:absolute;top:-12px;left:50%;
  transform:translateX(-50%);padding:0.3rem 1rem;border-radius:100px;
  background:var(--forest);color:white;font-size:0.7rem;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase}
.price-name{font-size:0.85rem;font-weight:600;color:var(--text-light);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.75rem}
.price-amount{font-family:var(--font-display);font-size:2.8rem;color:var(--charcoal);line-height:1}
.price-amount span{font-size:1rem;color:var(--text-light);font-family:var(--font-body)}
.price-period{font-size:0.8rem;color:var(--text-light);margin-bottom:1.5rem}
.price-features{list-style:none;display:flex;flex-direction:column;gap:0.6rem;margin-bottom:2rem}
.price-features li{font-size:0.85rem;color:var(--text);padding-left:1.5rem;position:relative}
.price-features li::before{content:'✓';position:absolute;left:0;color:var(--forest);font-weight:700}

/* Templates */
.templates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.25rem}
.template-card{border-radius:var(--radius-lg);overflow:hidden;border:2px solid var(--border);
  cursor:pointer;transition:all 0.3s}
.template-card:hover,.template-card.selected{border-color:var(--forest);
  box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.template-preview{height:140px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;padding:1.25rem}
.template-info{padding:0.75rem 1rem;background:var(--white)}
.template-info h4{font-size:0.85rem;font-family:var(--font-body);font-weight:600}
.template-info p{font-size:0.7rem;color:var(--text-light)}
.tpl-header{width:60%;height:8px;border-radius:4px;margin-bottom:0.75rem}
.tpl-line{width:80%;height:5px;border-radius:3px;margin-bottom:0.5rem;opacity:0.15}
.tpl-line:nth-child(3){width:50%}
.tpl-cards{display:flex;gap:0.5rem;margin-top:auto}
.tpl-cards div{flex:1;height:32px;border-radius:6px;opacity:0.1;border:1px solid currentColor}

/* Dashboard */
.dashboard{min-height:100vh;padding-top:var(--nav-height);background:var(--sand)}
.dash-layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - var(--nav-height))}
.dash-sidebar{background:var(--white);border-right:1px solid var(--border);padding:1.5rem 0}
.dash-sidebar-item{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1.5rem;
  font-size:0.85rem;color:var(--text-light);cursor:pointer;transition:all 0.2s;
  border-left:3px solid transparent}
.dash-sidebar-item:hover{color:var(--text);background:var(--sand)}
.dash-sidebar-item.active{color:var(--forest);font-weight:600;background:rgba(45,90,61,0.04);
  border-left-color:var(--forest)}
.dash-main{padding:2rem clamp(1.5rem,3vw,2.5rem)}
.dash-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);
  padding:2rem;margin-bottom:1.5rem}
.dash-card h3{font-size:1.3rem;margin-bottom:1.5rem}

/* Wizard */
.wizard-progress{display:flex;gap:0.25rem;margin-bottom:2.5rem}
.wizard-step{flex:1;height:4px;border-radius:2px;background:var(--border);transition:all 0.3s}
.wizard-step.done{background:var(--forest)}
.wizard-step.current{background:var(--gold)}
.wizard-header{margin-bottom:2rem}
.wizard-header h3{font-size:1.5rem;margin-bottom:0.35rem}
.wizard-header p{font-size:0.9rem;color:var(--text-light)}
.wizard-actions{display:flex;justify-content:space-between;margin-top:2rem;padding-top:1.5rem;
  border-top:1px solid var(--border)}

/* Service picker */
.service-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem}
.service-chip{padding:0.6rem 1rem;border-radius:var(--radius);border:1.5px solid var(--border);
  background:var(--white);cursor:pointer;transition:all 0.2s;font-size:0.82rem;text-align:center}
.service-chip:hover{border-color:var(--forest)}
.service-chip.selected{background:rgba(45,90,61,0.06);border-color:var(--forest);
  color:var(--forest);font-weight:500}

/* Resume upload */
.drop-zone{border:2px dashed var(--border-strong);border-radius:var(--radius-lg);padding:3rem 2rem;
  text-align:center;cursor:pointer;transition:all 0.3s;background:var(--white)}
.drop-zone:hover,.drop-zone.dragover{border-color:#6366F1;background:rgba(99,102,241,0.03)}
.drop-zone h4{font-size:1.1rem;margin-bottom:0.5rem}
.drop-zone p{font-size:0.85rem;color:var(--text-light)}

/* Color picker */
.color-swatches{display:flex;gap:0.5rem;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;
  transition:all 0.2s}
.color-swatch:hover,.color-swatch.selected{border-color:var(--charcoal);transform:scale(1.15)}

/* AI content cards */
.ai-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:1.5rem;position:relative;transition:all 0.3s}
.ai-card:hover{border-color:rgba(99,102,241,0.3);box-shadow:0 4px 16px rgba(99,102,241,0.08)}
.ai-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.ai-card-label{font-size:0.75rem;font-weight:600;color:var(--text-light);text-transform:uppercase;
  letter-spacing:0.06em}
.ai-regen{font-size:0.75rem;color:#6366F1;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:0.3rem}
.ai-regen:hover{text-decoration:underline}

/* Live preview mini */
.live-preview-frame{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;
  transform:scale(0.6);transform-origin:top left;width:166.67%;height:800px;pointer-events:none}

/* Doctor site */
.doc-site{min-height:100vh}
.doc-hero-content{max-width:1200px;margin:0 auto;width:100%;display:grid;
  grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.doc-name{font-size:clamp(2.2rem,4.5vw,3.2rem);margin-bottom:0.5rem}
.doc-creds{font-family:var(--font-display);font-style:italic;font-size:1.05rem;margin-bottom:0.75rem}
.doc-bio{font-size:0.92rem;color:var(--text-light);line-height:1.7;margin-bottom:2rem}
.doc-stats{display:flex;gap:2rem;margin-bottom:2rem;flex-wrap:wrap}
.doc-stat-num{font-family:var(--font-display);font-size:1.8rem;line-height:1}
.doc-stat-label{font-size:0.7rem;color:var(--text-light);text-transform:uppercase;
  letter-spacing:0.06em;margin-top:0.2rem}
.doc-photo{width:100%;max-width:380px;aspect-ratio:3/4;border-radius:var(--radius-xl);
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  font-family:var(--font-display);font-size:5rem;overflow:hidden;border:1px solid var(--border)}
.doc-section{padding:clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem)}
.doc-section-inner{max-width:1200px;margin:0 auto}
.doc-section-title{font-size:clamp(1.8rem,3vw,2.4rem);text-align:center;margin-bottom:2.5rem}
.doc-services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.25rem}
.doc-service-card{padding:1.75rem;border-radius:var(--radius-lg);background:var(--white);
  border:1px solid var(--border);transition:all 0.3s}
.doc-service-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.doc-service-card h4{font-size:1.1rem;margin-bottom:0.35rem}
.doc-service-card p{font-size:0.82rem;color:var(--text-light);line-height:1.6}
.doc-service-fee{margin-top:0.75rem;font-weight:600}
.doc-booking-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.doc-booking-form{display:flex;flex-direction:column;gap:0.75rem}

/* Payment modal */
.pay-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn 0.2s}
.pay-card{background:var(--white);border-radius:var(--radius-xl);width:100%;max-width:420px;
  padding:2.5rem;animation:scaleIn 0.3s}
.pay-amount{font-family:var(--font-display);font-size:2.5rem;color:var(--forest);
  text-align:center;margin:1rem 0}
.pay-details{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1.5rem}
.pay-row{display:flex;justify-content:space-between;font-size:0.85rem;

// ─── API Helper ─────────────────────────────────────────────
async function callAPI(endpoint, body){
  const res = await fetch(endpoint, {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({error:'Request failed'}));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

// ─── PDF Text Extraction ────────────────────────────────────
async function extractPdfText(file){
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  let text = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item=>item.str).join(' ') + '\n';
  }
  return text.trim();
}

// ─── AUTH PAGE ──────────────────────────────────────────────
function AuthPage({setPage}){
  const [mode,setMode]=useState('signup');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const handleEmail=async(e)=>{
    e.preventDefault();setErr('');setLoading(true);
    try{
      if(mode==='signup') await auth.createUserWithEmailAndPassword(email,pw);
      else await auth.signInWithEmailAndPassword(email,pw);
    }catch(e){
      const msgs={'auth/email-already-in-use':'Email already registered. Try logging in.',
        'auth/wrong-password':'Incorrect password.','auth/user-not-found':'No account found. Try signing up.',
        'auth/weak-password':'Password must be at least 6 characters.'};
      setErr(msgs[e.code]||e.message);
    }
    setLoading(false);
  };
  const handleGoogle=async()=>{
    setErr('');
    try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}
    catch(e){setErr(e.message)}
  };
  return h('div',{className:'auth-page'},
    h('form',{className:'auth-card animate-up',onSubmit:handleEmail},
      h('div',{style:{textAlign:'center',marginBottom:'0.5rem'}},
        h('span',{style:{fontFamily:'var(--font-display)',fontSize:'1.8rem',color:'var(--forest)'}},
          'Doc',h('em',{style:{fontStyle:'italic',color:'var(--gold)'}},'Page'))),
      h('h2',null,mode==='signup'?'Create your website':'Welcome back'),
      h('p',{className:'subtitle'},mode==='signup'?'AI will help you build it in minutes':'Log in to your dashboard'),
      h('button',{type:'button',className:'google-btn',onClick:handleGoogle},'Continue with Google'),
      h('div',{className:'auth-divider'},'or'),
      err&&h('div',{className:'auth-error'},err),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'0.75rem'}},
        h('div',{className:'form-group'},
          h('input',{className:'form-input',type:'email',placeholder:'Email address',required:true,
            value:email,onChange:e=>setEmail(e.target.value)})),
        h('div',{className:'form-group'},
          h('input',{className:'form-input',type:'password',placeholder:'Password (min 6 chars)',
            required:true,minLength:6,value:pw,onChange:e=>setPw(e.target.value)})),
        h('button',{type:'submit',className:'btn btn-primary btn-block',disabled:loading},
          loading?h('div',{className:'spinner'}):mode==='signup'?'Create Account':'Log In')),
      h('div',{className:'auth-toggle'},
        mode==='signup'?'Already have an account? ':'Don\'t have an account? ',
        h('button',{type:'button',onClick:()=>{setMode(mode==='signup'?'login':'signup');setErr('')}},
          mode==='signup'?'Log in':'Sign up'))));
}

       {n:'₹0',l:'Revenue',icon:'💰'},{n:form.services?.length||0,l:'Services',icon:'🏥'}
      ].map((s,i)=>h('div',{key:i,className:'dash-card',style:{marginBottom:0}},

}

// ─── WIZARD (6 Steps) ───────────────────────────────────────
function Wizard({form,updateForm,updateFormMulti,step,setStep,nextStep,totalSteps,saving,saveToFirestore,user}){
  const steps=['Quick Start','Your Info','Services','Theme & Colors','AI Content','Preview & Publish'];
  const [resumeLoading,setResumeLoading]=useState(false);
  const [resumeError,setResumeError]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const [aiError,setAiError]=useState('');
  const [aiStatus,setAiStatus]=useState('');
  const [regenSection,setRegenSection]=useState(null);
  const fileRef=useRef(null);

  const toggleArr=(key,val)=>{
    const cur=form[key]||[];
    updateForm(key,cur.includes(val)?cur.filter(x=>x!==val):[...cur,val]);
  };

  // Resume upload handler
  const handleResume=async(file)=>{
    if(!file)return;
    setResumeLoading(true);setResumeError('');
    try{
      let text='';
      if(file.type==='application/pdf'){
        text=await extractPdfText(file);
      } else {
        text=await file.text();
      }
      if(text.length<20) throw new Error('Could not read enough text from file');
      updateForm('resumeText',text);
      const {result}=await callAPI('/api/parse-resume',{text});
      updateForm('resumeParsed',result);
      // Auto-fill form fields
      const updates={};
      if(result.name)updates.name=result.name;
      if(result.qualifications)updates.qualifications=result.qualifications;
      if(result.specialization)updates.specialization=result.specialization;
      if(result.experience)updates.experience=result.experience;
      if(result.services)updates.services=result.services;
      if(result.clinicName)updates.clinicName=result.clinicName;
      if(result.address)updates.address=result.address;
      if(result.city)updates.city=result.city;
      if(result.state)updates.state=result.state;
      if(result.phone)updates.phone=result.phone;
      if(result.email)updates.email=result.email;
      if(result.bio)updates.bio=result.bio;
      if(result.publications)updates.publications=result.publications;
      if(result.name)updates.slug=slugify(result.name);
      updateFormMulti(updates);
      setStep(1); // Move to info review step
    }catch(e){
      setResumeError(e.message||'Could not read PDF. Try filling in details manually.');
    }
    setResumeLoading(false);
  };

  // AI content generation
  const generateAI=async(section)=>{
    const isFullGen=!section;
    if(isFullGen){setAiLoading(true);setAiError('')}
    else setRegenSection(section);

    try{
      if(isFullGen){
        setAiStatus('Crafting your bio...');
        const {result}=await callAPI('/api/generate',{
          name:form.name,specialization:form.specialization,
          qualifications:form.qualifications,experience:form.experience,
          services:form.services,clinicName:form.clinicName,city:form.city,bio:form.bio
        });
        setAiStatus('Finalizing...');
        const updates={};
        if(result.bio)updates.generatedBio=result.bio;
        if(result.tagline)updates.generatedTagline=result.tagline;
        if(result.serviceDescriptions)updates.serviceDescriptions=result.serviceDescriptions;
        if(result.seoTitle)updates.seoTitle=result.seoTitle;
        if(result.seoDescription)updates.seoDescription=result.seoDescription;
        if(result.ctaText)updates.ctaText=result.ctaText;
        updateFormMulti(updates);
      } else {
        const {result}=await callAPI('/api/generate',{
          name:form.name,specialization:form.specialization,
          qualifications:form.qualifications,experience:form.experience,
          services:form.services,clinicName:form.clinicName,city:form.city,bio:form.bio,
          section
        });
        if(section==='bio')updateForm('generatedBio',typeof result==='string'?result:result.bio||'');
        else if(section==='tagline')updateForm('generatedTagline',typeof result==='string'?result:result.tagline||'');
        else if(section==='services')updateForm('serviceDescriptions',typeof result==='object'?result:form.serviceDescriptions);
        else if(section==='seo')updateFormMulti({seoTitle:result.title||'',seoDescription:result.description||''});
        else if(section==='cta')updateForm('ctaText',typeof result==='string'?result:result.ctaText||'');
      }
    }catch(e){
      if(isFullGen)setAiError(e.message);
    }
    setAiLoading(false);setAiStatus('');setRegenSection(null);
  };

  const isParsed=(field)=>form.resumeParsed&&form.resumeParsed[field];

  return h('div',null,
    h('div',{className:'wizard-progress'},
      steps.map((s,i)=>h('div',{key:i,className:'wizard-step '+(i<step?'done':'')+' '+(i===step?'current':'')}))),

    // Step 0: Quick Start
    step===0&&h('div',{className:'dash-card animate-up'},
      h('div',{className:'wizard-header'},
        h('h3',null,'Quick Start'),
        h('p',null,'Upload your resume for AI-powered setup, or fill in details manually')),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'1.5rem'}},
        h('div',{className:'drop-zone'+(resumeLoading?' dragover':''),
          onClick:()=>fileRef.current?.click(),
          onDragOver:e=>{e.preventDefault();e.currentTarget.classList.add('dragover')},
          onDragLeave:e=>e.currentTarget.classList.remove('dragover'),
          onDrop:e=>{e.preventDefault();e.currentTarget.classList.remove('dragover');
            handleResume(e.dataTransfer.files[0])}},
          h('input',{ref:fileRef,type:'file',accept:'.pdf,.txt,.doc,.docx',style:{display:'none'},
            onChange:e=>handleResume(e.target.files[0])}),
          resumeLoading?
            h(Fragment,null,h('div',{className:'spinner',style:{borderColor:'rgba(99,102,241,0.2)',borderTopColor:'#6366F1',width:32,height:32,margin:'0 auto 1rem'}}),
              h('p',{style:{color:'#6366F1',fontWeight:500}},'Parsing your resume with AI...')):
            h(Fragment,null,
              h('div',{style:{fontSize:'2.5rem',marginBottom:'0.75rem'}},'📄'),
              h('h4',null,'Drop your resume here'),
              h('p',null,'PDF or text file — AI will extract your details'),
              h('div',{className:'ai-badge',style:{margin:'0.75rem auto 0'}},'🤖 Powered by AI'))),
        resumeError&&h('div',{style:{color:'#D44',fontSize:'0.85rem',textAlign:'center'}},resumeError),
        h('div',{className:'auth-divider'},'or'),
        h('button',{className:'btn btn-secondary btn-block',onClick:()=>setStep(1)},'Fill in Manually →'))),

    // Step 1: Your Info
    step===1&&h('div',{className:'dash-card animate-up'},
      h('div',{className:'wizard-header'},
        h('h3',null,'Your Information'),
        h('p',null,'Review and edit your professional details',
          Object.keys(form.resumeParsed||{}).length>0&&h('span',{className:'ai-badge',style:{marginLeft:'0.5rem'}},'🤖 AI-parsed from resume'))),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'1rem'}},
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Full Name',isParsed('name')&&h('span',{className:'ai-badge',style:{marginLeft:'0.5rem'}},'AI')),
          h('input',{className:'form-input',placeholder:'Dr. Your Name',
            value:form.name,onChange:e=>{updateForm('name',e.target.value);updateForm('slug',slugify(e.target.value))}})),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Specialization',isParsed('specialization')&&h('span',{className:'ai-badge',style:{marginLeft:'0.5rem'}},'AI')),
          h('select',{className:'form-input',value:form.specialization,
            onChange:e=>updateForm('specialization',e.target.value)},
            h('option',{value:''},'Select specialization'),
            SPECIALIZATIONS.map(s=>h('option',{key:s,value:s},s)))),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Qualifications'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:'0.4rem'}},
            QUALIFICATIONS.map(q=>h('button',{key:q,type:'button',
              className:'service-chip '+(form.qualifications?.includes(q)?'selected':''),
              style:{padding:'0.4rem 0.8rem'},onClick:()=>toggleArr('qualifications',q)},q)))),
        h('div',{className:'form-row'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Registration Number'),
            h('input',{className:'form-input',placeholder:'e.g. KMC/12345',
              value:form.registration,onChange:e=>updateForm('registration',e.target.value)})),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Years of Experience'),
            h('input',{className:'form-input',placeholder:'e.g. 10',
              value:form.experience,onChange:e=>updateForm('experience',e.target.value)}))),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Clinic / Hospital Name'),
          h('input',{className:'form-input',placeholder:'e.g. Kaya Clinic',
            value:form.clinicName,onChange:e=>updateForm('clinicName',e.target.value)})),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Address'),
          h('textarea',{className:'form-input',placeholder:'Full address...',
            value:form.address,onChange:e=>updateForm('address',e.target.value)})),
        h('div',{className:'form-row'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'City'),
            h('input',{className:'form-input',value:form.city,onChange:e=>updateForm('city',e.target.value)})),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'State'),
            h('input',{className:'form-input',value:form.state,onChange:e=>updateForm('state',e.target.value)}))),
        h('div',{className:'form-row'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Phone Number'),
            h('input',{className:'form-input',placeholder:'+91 XXXXX XXXXX',
              value:form.phone,onChange:e=>updateForm('phone',e.target.value)})),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Email'),
            h('input',{className:'form-input',type:'email',placeholder:'doctor@email.com',
              value:form.email||user?.email||'',onChange:e=>updateForm('email',e.target.value)}))),
        h('div',{className:'form-row'},
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Working Hours'),
            h('input',{className:'form-input',value:form.hours,onChange:e=>updateForm('hours',e.target.value)})),
          h('div',{className:'form-group'},
            h('label',{className:'form-label'},'Languages'),
            h('div',{style:{display:'flex',flexWrap:'wrap',gap:'0.4rem'}},
              ['English','Hindi','Kannada','Telugu','Tamil','Malayalam','Marathi','Bengali','Gujarati','Punjabi','Urdu'].map(l=>
                h('button',{key:l,type:'button',className:'service-chip '+(form.languages?.includes(l)?'selected':''),
                  style:{padding:'0.4rem 0.8rem'},onClick:()=>toggleArr('languages',l)},l))))),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Professional Bio (optional — AI can generate this later)'),
          h('textarea',{className:'form-input',style:{minHeight:'100px'},
            placeholder:'Brief professional bio...',
            value:form.bio,onChange:e=>updateForm('bio',e.target.value)})),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Publications / Achievements (optional)'),
          h('textarea',{className:'form-input',placeholder:'Notable achievements...',
            value:form.publications,onChange:e=>updateForm('publications',e.target.value)})),
        h('div',{className:'form-group'},
          h('label',{className:'form-label'},'Site URL'),
          h('div',{style:{display:'flex',alignItems:'center',gap:'0.5rem'}},
            h('span',{style:{fontSize:'0.85rem',color:'var(--text-light)'}},'docpage.vercel.app/dr/'),
            h('input',{className:'form-input',style:{flex:1},
              value:form.slug,onChange:e=>updateForm('slug',slugify(e.target.value))}))))),

    // Step 2: Services & Fees
    step===2&&h('div',{className:'dash-card animate-up'},
      h('div',{className:'wizard-header'},
        h('h3',null,'Services & Fees'),
        h('p',null,'What services do you offer?')),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'1.5rem'}},
        MEDICAL_SERVICES.filter(cat=>!form.specialization||
          cat.cat==='General'||cat.cat===form.specialization||
          form.services?.some(s=>cat.items.includes(s))
        ).map(cat=>h('div',{key:cat.cat},
          h('label',{className:'form-label',style:{marginBottom:'0.5rem',display:'block'}},cat.cat),
          h('div',{className:'service-picker'},
            cat.items.map(s=>h('div',{key:s,
              className:'service-chip '+(form.services?.includes(s)?'selected':''),
              onClick:()=>toggleArr('services',s)},s))))),
        h('div',{style:{borderTop:'1px solid var(--border)',paddingTop:'1.5rem'}},
          h('label',{className:'form-label',style:{marginBottom:'0.75rem',display:'block'}},'Consultation Fees'),
          h('div',{className:'form-row'},
            h('div',{className:'form-group'},
              h('label',{className:'form-label',style:{fontSize:'0.7rem'}},'First Consultation (₹)'),
              h('input',{className:'form-input',type:'number',placeholder:'500',
                value:form.consultFee,onChange:e=>updateForm('consultFee',e.target.value)})),
            h('div',{className:'form-group'},
              h('label',{className:'form-label',style:{fontSize:'0.7rem'}},'Follow-up (₹)'),
              h('input',{className:'form-input',type:'number',placeholder:'300',
                value:form.followupFee,onChange:e=>updateForm('followupFee',e.target.value)})))))),

    // Step 3: Theme & Colors
    step===3&&h('div',{className:'dash-card animate-up'},
      h('div',{className:'wizard-header'},
        h('h3',null,'Theme & Colors'),
        h('p',null,'Pick a template and customize the accent color')),
      h('div',{style:{display:'flex',flexDirection:'column',gap:'2rem'}},
        h('div',null,
          h('label',{className:'form-label',style:{marginBottom:'0.75rem',display:'block'}},'Template'),
          h('div',{className:'templates-grid'},
            TEMPLATES.map(t=>h('div',{key:t.id,
              className:'template-card '+(form.template===t.id?'selected':''),
              onClick:()=>{updateForm('template',t.id);if(!form.accentColor)updateForm('accentColor',t.accent)}},
              h('div',{className:'template-preview',style:{background:t.bg,color:t.accent}},
                h('div',{className:'tpl-header',style:{background:t.accent}}),
                h('div',{className:'tpl-line',style:{background:t.accent}}),
                h('div',{className:'tpl-line',style:{background:t.accent}}),
                h('div',{className:'tpl-line',style:{background:t.accent}}),
                h('div',{className:'tpl-cards'},h('div',{style:{background:t.accent}}),h('div',{style:{background:t.accent}}),h('div',{style:{background:t.accent}}))),

        h('div',null,
          h('label',{className:'form-label',style:{marginBottom:'0.75rem',display:'block'}},'Accent Color'),
          h('div',{style:{display:'flex',gap:'1rem',alignItems:'center',flexWrap:'wrap'}},
            h('div',{className:'color-swatches'},
              ['#C4725A','#3366CC','#2C2C2C','#C4A355','#6366F1','#E11D48','#059669','#D97706','#7C3AED','#2563EB'].map(c=>

            h('input',{type:'color',value:form.accentColor||TEMPLATES.find(t=>t.id===form.template)?.accent||'#2D5A3D',

              onChange:e=>updateForm('accentColor',e.target.value)}))),
        h('div',null,
          h('label',{className:'form-label',style:{marginBottom:'0.75rem',display:'block'}},'Hero Layout'),
          h('div',{style:{display:'flex',gap:'0.75rem'}},
            [{id:'split',label:'Split (Photo Right)'},{id:'centered',label:'Centered'},{id:'fullwidth',label:'Full Width'}].map(s=>
              h('button',{key:s.id,className:'service-chip '+(form.heroStyle===s.id?'selected':''),
                onClick:()=>updateForm('heroStyle',s.id)},s.label)))))),

            h('p',{style:{color:'#6366F1',fontWeight:500}},aiStatus||'Generating...')),

    // Step 5: Preview & Publish

// ─── DOCTOR SITE (Route wrapper) ────────────────────────────
function DoctorSite({slug}){
  const [doc,setDoc]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(slug==='demo'){setDoc(DEMO_DOC);setLoading(false);return}
    db.collection('docpages').where('slug','==',slug).where('published','==',true)
      .limit(1).get().then(snap=>{
        if(!snap.empty)setDoc(snap.docs[0].data());
        setLoading(false);
      }).catch(()=>setLoading(false));
  },[slug]);

  if(loading) return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{className:'spinner',style:{borderColor:'rgba(45,90,61,0.2)',borderTopColor:'var(--forest)',width:32,height:32}}));
  if(!doc) return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'1rem'}},
    h('div',{style:{fontSize:'3rem'}},'🔍'),
    h('h2',{style:{fontFamily:'var(--font-display)',fontSize:'1.8rem'}},'Site not found'),
    h('p',{style:{color:'var(--text-light)'}},'This page doesn\'t exist or hasn\'t been published yet.'),
    h('a',{href:'#/',className:'btn btn-primary'},'Go to DocPage'));

  // Inject SEO meta tags
  if(doc.seoTitle)document.title=doc.seoTitle;
  const metaDesc=document.querySelector('meta[name="description"]');
  if(metaDesc&&doc.seoDescription)metaDesc.setAttribute('content',doc.seoDescription);

  return h(DoctorSiteInner,{doc});
}

// ─── APP ────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [page,setPage]=useState('landing');
  const [routeSlug,setRouteSlug]=useState(null);

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>{
      setUser(u);setAuthReady(true);
      if(u&&page==='auth')setPage('dashboard');
    });
    return unsub;
  },[]);

  useEffect(()=>{
    const handleHash=()=>{
      const hash=window.location.hash.slice(1)||'/';
      if(hash.startsWith('/dr/')){setRouteSlug(hash.replace('/dr/',''));setPage('doctorsite')}
      else if(hash==='/dashboard')setPage('dashboard');
      else if(hash==='/auth')setPage('auth');
    };
    handleHash();
    window.addEventListener('hashchange',handleHash);
    return ()=>window.removeEventListener('hashchange',handleHash);
  },[]);

  useEffect(()=>{
    if(page==='doctorsite')return;
    window.scrollTo({top:0,behavior:'smooth'});
  },[page]);

  // Seed demo
  useEffect(()=>{
    db.collection('docpages').where('slug','==','demo').limit(1).get().then(snap=>{
      if(snap.empty)db.collection('docpages').doc('demo').set(DEMO_DOC);
    }).catch(()=>{});
  },[]);

  if(!authReady) return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{className:'spinner',style:{borderColor:'rgba(45,90,61,0.2)',borderTopColor:'var(--forest)',width:32,height:32}}));

  if(page==='doctorsite') return h(DoctorSite,{slug:routeSlug});

  return h(Fragment,null,
    h(Nav,{user,page,setPage}),
    page==='landing'&&h(Landing,{setPage}),
    page==='auth'&&h(AuthPage,{setPage}),
    page==='dashboard'&&(user?h(Dashboard,{user,setPage}):h(AuthPage,{setPage}))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
